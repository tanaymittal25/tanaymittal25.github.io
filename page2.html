<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
 <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/animate.css@3.5.2/animate.min.css">
  <link href="https://fonts.googleapis.com/css?family=Amatic+SC|Gloria+Hallelujah|Satisfy" rel="stylesheet">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
<style type="text/css">
	#login{
    margin-top: 8px;
		box-shadow: 2px 1px 20px black;
		width: 38%;
		position: absolute;
		left: 30%;
    padding: 1em 2em 0em 2em;
	}
#brand{
  font-size: 1.2em;
  font-weight: bolder;
  font-family: arial;
}
</style>
</head>
<body>
	<div class="container">
	<form id="login" class="bg-light " action="tanay.html" method="get">
    <div class="navbar-brand col-lg-12 text-center">
      <p id="brand">TANAY</p>
    </div>
		<div class="form-group">
    <label for="exampleInputEmail1">First Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter First Name" name="first" required>
  <div class="form-group">
  	<label for="exampleInputEmail1">Second Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Second Name" name="second">
  <div class="form-group">
  	 <label for="exampleInputEmail1">Age</label>
    <input type="number" style="width: 25%" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Age" name="age">
  </div>
    <label for="exampleInputEmail1">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email" name="email" required>
  </div>
  <div class="form-group">
    <label for="exampleInputPassword1">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password" name="pass" min="6" required>
  </div>
  <div class="form-group">
    <label for="exampleInputPassword1"> Re-enter Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Re-enter Password" name="passAgain" required>
  </div>
 <div class="col-lg-12 text-center">
			<a class="nav-link" style="color: white" href="index.html">
		<button id="know" type="button" class="btn my-2 btn-success">Submit</button></a>
		</div>
</form>
	</div>
</div>
</body>
</html>
